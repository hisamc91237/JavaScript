<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript practice</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <div class="reels-all">
            <div class="reels">
                <img src="https://images.unsplash.com/photo-1560746420-1b4dc6d92d17?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">

                <div class="user">
                    <div class="user-info">
                        <img src="https://images.unsplash.com/photo-1629019725048-75f3fd5edd1c?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="">
                        <h3>Hisamuddin</h3>
                        <button class="btn">Follow</button>
                    </div>
                    <div class="title">
                        <h3>One Piece is the Best Anime</h3>
                    </div>
                </div>
                <div class="right">
                    <div class="love-icon">
                        <h3><i class="ri-heart-3-line"></i></h3>
                        <h4>200</h4>
                    </div>
                    <div class="comment-icon">
                        <h3><i class="ri-chat-1-line"></i></h3>
                        <h4>69</h4>
                    </div>
                    <div class="share-icon">
                        <h3><i class="ri-send-ins-line"></i></h3>
                        <h4>10</h4>
                    </div>
                    <div class="menu-icon">
                        <h3><i class="ri-more-2-line"></i></h3>

                    </div>
                </div>

            </div>
        </div>
    </section>
    <script src="index.js"></script>
</body>

</html>
