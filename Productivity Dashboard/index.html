<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://images.unsplash.com/photo-1517842645767-c639042777db" alt="">
                <h2>Todo List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://images.unsplash.com/photo-1506784983877-45594efa4cbe" alt="">
                <h2>Daily Planner</h2>
            </div>
            <div class="motivational elem" id="2">
                <img src="https://images.unsplash.com/photo-1564410267841-915d8e4d71ea?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fG1vdGl2YXRpb25hbCUyMHF1b3Rlc3xlbnwwfHwwfHx8MA%3D%3D"
                    alt="">
                <h2>Motivational Quotes</h2>
            </div>
            <div class="pomodoro elem" id="3">
                <img src="https://images.unsplash.com/photo-1594202001540-abde2a4d7f97?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="daily elem" id="4">
                <img src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b" alt="">
                <h2>Daily goals</h2>
            </div>
        </section>
        <section class="fullElems todo-fullpage">
            <button class="close" id="0">Close</button>
            <h2>Personalize Your Tasks</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" placeholder="Enter Task">
                        <textarea name="" id="" placeholder="Enter Details"></textarea>
                        <button>Add Task</button>
                    </form>
                </div>
                <div class="taskList">
                    <div class="taskList-container">
                        <div class="task">
                            <h4>DSA Study</h4>
                            <button>Mark As Completed </button>
                        </div>
                        <div class="task">
                            <h4>DSA Study</h4>
                            <button>Mark As Completed </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="fullElems"><button class="close" id="1">Close</button>Daily Planner</section>
        <section class="fullElems"><button class="close" id="2">Close</button>Motivational Quotes</section>
        <section class="fullElems"><button class="close" id="3">Close</button>Pomodoro Timer</section>
        <section class="fullElems"><button class="close" id="4">Close</button>>Daily Goals</section>
    </div>

    <script src="script.js"></script>
</body>

</html>
